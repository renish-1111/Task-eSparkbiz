<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table>
      <tr>
        <td id="click">click</td>
        <td id="dblclick">dblclick</td>
        <td id="contextmenu">contextmenu</td>
        <td id="mousedown">mousedown</td>
        <td id="mouseup">mouseup</td>
      </tr>
      <tr>
        <td id="mouseover">mouseover</td>
        <td id="mouseout">mouseout</td>
        <td id="mouseenter">mouseenter</td>
        <td id="mouseleave">mouseleave</td>
        <td id="mousemove">mousemove</td>
      </tr>
      <tr>
        <td>
          <input id="input" type="" placeholder="input" /><span
            id="inputkey"
          ></span>
        </td>
        <td>
          <input id="change" type="" placeholder="change" /><span
            id="changekey"
          ></span>
        </td>
        <td>
          <input id="focus" type="" placeholder="focus" /><span
            id="focuskey"
          ></span>
        </td>
        <td>
          <input id="focusin" type="" placeholder="focusin" /><span
            id="focusinkey"
          ></span>
        </td>
        <td>
          <input id="focusout" type="" placeholder="focusout" /><span
            id="focusoutkey"
          ></span>
        </td>
      </tr>
      <tr>
        <td>
          <input id="blur" type="" placeholder="blur" /><span
            id="blurkey"
          ></span>
        </td>
        <td>
          <input id="keyup" type="" placeholder="keyup" /><span
            id="keyupkey"
          ></span>
        </td>
        <td>
          <input id="keydown" type="" placeholder="keydown" /><span
            id="keydownkey"
          ></span>
        </td>
        <td>
          <input id="keypress" type="" placeholder="keypress" /><span
            id="keypresskey"
          ></span>
        </td>
        <td>
          <form id="submit" action="">
            <input type="submit" value="submit" />
          </form>
        </td>
      </tr>
      <tr>
        <td><p id="copy">Dont copy</p></td>
        <td><input id="paste" type="" placeholder="paste" /></td>
        <td><input id="cut" type="" placeholder="cut" /></td>
        <td id="drag" draggable="true">drag</td>
        <td id="select">
         <input type="text" id="select" value="dont select me">
        </td>
      </tr>
    </table>
    <script src="script.js"></script>
  </body>
</html>
