<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        padding: 30px 40px;
        border: 2px solid;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <table>
      <tr>
        <td>
          <div id="focus">
            <input id="runonfocus" value="onfocus()" />
          </div>
        </td>
        <td>
          <div id="runonclick">onclick()</div>
        </td>
        <td>
          <div id="runondblclick">ondblclick()</div>
        </td>
        <td>
          <div><input id="runonblur" value="onblur()" /></div>
        </td>
        <td>
          <div><input id="runonchange" value="runonchange()" /></div>
        </td>
      </tr>
      <tr>
        <td>
          <div id="color">
            onmouseover()/onmouseout()
          </div>
        </td>
        <td>
          <div id="mouseenter">
            onmouseenter()/onmouseleave()
          </div>
        </td>
        <td>
          <div id="mouseup">
            onmouseup()/onmousedown()
          </div>
        </td>
        <td><div id="runoncontextmenu">oncontextmenu()</div></td>
        <td>
          <div id="mousemove">
            onmousemove()/onmouseout()
          </div>
        </td>
      </tr>
      <tr>
        <td>
          <div>
            <input
              id="runonpaste"
              placeholder="paste than see runonpaste()"
            />
            <p id="paste"></p>
          </div>
        </td>
        <td>
          <div><details id="runontoggle">toggle</details></div>
        </td>
        <td>
          <div>
            <form id="runonsubmit">
              <input type="submit" value="submit" />
            </form>
          </div>
        </td>
        <td>
          <div><input id="runoninput" value="input" /></div>
        </td>
        <td>
          <div id="runoncopy">dont copy this</div>
        </td>
      </tr>
      <tr>
        <td>
          <div id="drag" draggable="true">drag</div>
        </td>
        <td id="rundragover">
          <div id=""></div>
        </td>
        <td>
          <div>
            <img
              id="runonerror"
              src="sdf.jpg"
              alt="onerror()"
              srcset=""
            />
            <p id="error"></p>
          </div>
        </td>
      </tr>
    </table>
    <script src="script.js"></script>
  </body>
</html>
